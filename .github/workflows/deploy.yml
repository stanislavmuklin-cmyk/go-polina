name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          RELEASE_ID="$(date +%Y%m%d%H%M%S)"
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          tar -C dist -czf "release-$RELEASE_ID.tar.gz" .
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}/releases/$RELEASE_ID/dist'"
          scp "release-$RELEASE_ID.tar.gz" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/releases/$RELEASE_ID/release.tar.gz"

      - name: Activate release
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -eu
            cd '${{ secrets.DEPLOY_PATH }}/releases/$RELEASE_ID'
            tar -xzf release.tar.gz -C dist
            rm -f release.tar.gz
            ln -sfn '${{ secrets.DEPLOY_PATH }}/releases/$RELEASE_ID/dist' '${{ secrets.DEPLOY_PATH }}/current'
          "

      - name: Upload edge functions
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "mkdir -p /opt/supabase-project/volumes/functions"
          scp -r supabase/functions/* "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/supabase-project/volumes/functions/"

      - name: Restart edge functions
        run: |
          ssh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "
            set -eu
            cd /opt/supabase-project
            docker compose up -d --force-recreate --no-deps functions
          "
